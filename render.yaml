services:
  - type: web
    name: fragments-ai-backend
    env: python
    plan: free
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:8000
    envVars:
      - key: PYTHON_VERSION
        value: 3.10
    autoDeploy: true
    buildFilter:
      paths:
        - app.py
        - requirements.txt
        - render.yaml
        - static/index.html
