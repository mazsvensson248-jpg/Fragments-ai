services:
  - type: web
    name: video-processing-backend
    env: python
    plan: free
    branch: main
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
      apt-get update && apt-get install -y ffmpeg
    startCommand: gunicorn app:app --workers 2 --bind 0.0.0.0:$PORT
    envVars: []
    autoDeploy: true
    healthCheckPath: /
