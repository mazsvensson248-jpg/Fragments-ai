services:
  - type: web
    name: video-processing-backend
    env: python
    plan: free
    branch: main
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
      sudo apt-get update && sudo apt-get install -y ffmpeg
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars: []
    autoDeploy: true
    healthCheckPath: /
