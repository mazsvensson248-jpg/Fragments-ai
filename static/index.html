<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FRAGMENTS</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background-color: #0f0f0f;
      color: white;
    }
    /* ... [everything else remains unchanged] ... */
    #loading {
      display: none;
      text-align: center;
      margin: 1rem 0;
      font-size: 1rem;
      color: #38bdf8;
    }
  </style>
</head>
<body>
  <header>
    <h1>FRAGMENTS</h1>
    <p>Harness the power of AI to create, generate, and innovate. Your creative journey starts here.</p>
  </header>

  <!-- Existing unchanged content continues... -->

  <section id="videoDashboard">
    <h2>🎬 AI Video Generator</h2>
    <label for="prompt">Enter your prompt:</label>
    <textarea id="prompt" rows="4" placeholder="Write your story..."></textarea>

    <label>Select up to 10 YouTube video links:</label>
    <div class="video-list">
      <!-- unchanged list of video checkboxes -->
    </div>

    <button onclick="generateVideos()">Generate</button>
    <div id="loading">⏳ Generating video...</div>
    <div class="back-button">
      <button onclick="goBack()">⬅ Back</button>
    </div>
  </section>

  <!-- Rest of HTML remains unchanged -->
  
  <script>
    lucide.createIcons();

    function showAIDashboard() {
      document.getElementById('mainGrid').style.display = 'none';
      document.getElementById('videoDashboard').style.display = 'none';
      document.getElementById('aiDashboard').style.display = 'block';
    }

    function showVideoDashboard() {
      document.getElementById('mainGrid').style.display = 'none';
      document.getElementById('aiDashboard').style.display = 'none';
      document.getElementById('videoDashboard').style.display = 'block';
    }

    function goBack() {
      document.getElementById('aiDashboard').style.display = 'none';
      document.getElementById('videoDashboard').style.display = 'none';
      document.getElementById('mainGrid').style.display = 'grid';
    }

    async function generateVideos() {
      const prompt = document.getElementById('prompt').value.trim();
      const selectedVideos = [...document.querySelectorAll('.video-item input:checked')].map(cb => cb.value);

      if (!prompt) {
        alert('Please enter a prompt!');
        return;
      }

      if (selectedVideos.length === 0 || selectedVideos.length > 10) {
        alert('Please select between 1 and 10 videos.');
        return;
      }

      document.getElementById('loading').style.display = 'block';

      try {
        const response = await fetch("/api/video", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            prompt: prompt,
            links: selectedVideos
          })
        });

        if (!response.ok) {
          throw new Error("Video generation failed.");
        }

        const blob = await response.blob();
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "generated_video.mp4";
        document.body.appendChild(a);
        a.click();
        a.remove();
        window.URL.revokeObjectURL(url);
      } catch (error) {
        alert("❌ Error: " + error.message);
      } finally {
        document.getElementById('loading').style.display = 'none';
      }
    }

    const chatBox = document.getElementById('chatBox');
    const userInput = document.getElementById('userInput');
    const openRouterApiKey = "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";

    function appendMessage(text, sender) {
      const msg = document.createElement('div');
      msg.classList.add('message', sender);
      msg.textContent = text;
      chatBox.appendChild(msg);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function sendMessage() {
      const text = userInput.value.trim();
      if (!text) {
        alert("Please enter a message.");
        return;
      }

      appendMessage(text, 'user');
      userInput.value = '';
      appendMessage("⏳ AI is typing...", 'ai');

      try {
        const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${openRouterApiKey}`,
            "HTTP-Referer": "https://fragments.ai",
            "X-Title": "FRAGMENTS AI Chat"
          },
          body: JSON.stringify({
            model: "openai/gpt-3.5-turbo",
            messages: [
              { role: "system", content: "You are a helpful assistant from FRAGMENTS AI." },
              { role: "user", content: text }
            ]
          })
        });

        const data = await response.json();
        const aiTyping = chatBox.querySelectorAll(".ai");
        if (aiTyping.length) aiTyping[aiTyping.length - 1].remove();

        if (data.choices && data.choices.length > 0) {
          appendMessage(data.choices[0].message.content, 'ai');
        } else {
          appendMessage("❌ No response from AI.", 'ai');
        }
      } catch (err) {
        appendMessage("❌ Error: " + err.message, 'ai');
      }
    }
  </script>
</body>
</html>
