# Railway.com Nixpacks configuration for zero errors
[phases.setup]
nixPkgs = [
    "python311",
    "python311Packages.pip",
    "ffmpeg",
    "gcc",
    "git",
    "curl"
]

[phases.install]
cmds = [
    "pip install --upgrade pip",
    "pip install -r requirements.txt"
]

[phases.build]
cmds = [
    "mkdir -p templates static",
    "mkdir -p /tmp/fragments_temp /tmp/fragments_output"
]

[start]
cmd = "gunicorn main:app --bind 0.0.0.0:$PORT --workers 1 --timeout 300"

[variables]
FLASK_APP = "main.py"
FLASK_ENV = "production"
RAILWAY_ENVIRONMENT = "production"
PYTHONUNBUFFERED = "1"
PYTHONDONTWRITEBYTECODE = "1"
